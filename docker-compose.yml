services:
  db:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: intfnd
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pw
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # overrides DATABASE_URL from .env to use the internal Docker hostname
      DATABASE_URL: postgres://postgres:pw@db:5432/intfnd
    depends_on:
      db:
        condition: service_healthy
   
  caddy:        
    image: caddy:2-alpine                                                                                                                         
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:                                                                                                                                      
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data                                                                                                                          
    depends_on: 
      - app


volumes:
  pgdata:
  caddy_data:


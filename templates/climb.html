<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>intfnd · climb</title>
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 1.1rem; font-weight: bold; color: #222; text-decoration: none; }
    .logo img { width: 24px; height: 24px; }
    nav.tabs { display: flex; gap: 4px; }
    nav.tabs a {
      padding: 6px 14px;
      font-size: 0.85rem;
      color: #555;
      text-decoration: none;
      border-radius: 4px;
    }
    nav.tabs a:hover { background: #f4f4f4; color: #222; }
    nav.tabs a.active { background: #2563eb; color: #fff; }

    /* ── main ── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── map panel ── */
    #map-panel {
      display: flex;
      flex-direction: column;
      flex: 0 0 62%;
      border-right: 1px solid #ddd;
    }
    #map { flex: 1; }

    /* ── info panel ── */
    #info-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #info-top {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #info-bottom {
      flex: 0 0 38%;
      border-top: 1px solid #ddd;
      background: #fff;
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      transition: flex-basis 0.18s ease;
    }
    /* predictor needs more room than the chart, so the bottom panel grows for it */
    #info-bottom.predictor-active { flex-basis: 63%; }

    .bottom-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
    }
    #chart-view { flex: 1; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
    #predictor-view { flex: 1; overflow-y: auto; min-height: 0; }
    [hidden] { display: none !important; }

    .back-link {
      font-size: 0.8rem;
      color: #2563eb;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }

    .climb-name {
      font-size: 1.2rem;
      font-weight: bold;
      color: #222;
    }

    .surface-tag {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .surface-paved { background: #eef; color: #335; }
    .surface-unpaved { background: #f5ecdf; color: #7a4a1c; }

    .direction-tag {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .direction-bidi { background: #e7f4ea; color: #2d6a3a; }
    .direction-oneway { background: #f4ece7; color: #6a3a2d; }

    .climb-tags { display: flex; gap: 4px; flex-wrap: wrap; flex-shrink: 0; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-label { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 0.95rem; color: #222; font-weight: bold; }

    .score-note {
      font-size: 0.72rem;
      color: #888;
      line-height: 1.4;
      padding: 0 2px;
      opacity: 0.85;
    }

    .surfaces-list {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .surfaces-label { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.04em; }
    .surfaces-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .surface-pill {
      font-size: 0.72rem;
      padding: 2px 6px;
      border-radius: 3px;
      background: #f4f4f4;
      color: #555;
      border: 1px solid #e4e4e4;
    }

    .osm-source {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px 10px;
    }
    .osm-source-label {
      font-size: 0.72rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }
    .osm-source-label::-webkit-details-marker { display: none; }
    .osm-source-label::before {
      content: '▸';
      font-size: 0.7rem;
      transition: transform 0.15s ease;
    }
    .osm-source[open] > .osm-source-label::before { transform: rotate(90deg); }
    .osm-source-label:hover { color: #555; }
    .osm-count { color: #bbb; }
    .osm-links { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .osm-link {
      font-size: 0.72rem;
      padding: 2px 6px;
      border-radius: 3px;
      background: #fff5ef;
      color: #2563eb;
      border: 1px solid #fcd9c5;
      text-decoration: none;
    }
    .osm-link:hover { background: #2563eb; color: #fff; border-color: #2563eb; }

    /* ── performance predictor ── */
    .predictor {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .pred-controls { display: flex; flex-direction: column; gap: 9px; }
    .pred-row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .pred-field { display: flex; flex-direction: column; gap: 3px; }
    .pred-field > label { font-size: 0.72rem; color: #888; }
    .pred-field input[type="number"], .pred-field select {
      font-family: monospace;
      font-size: 0.82rem;
      padding: 4px 6px;
      border: 1px solid #ddd;
      border-radius: 3px;
      background: #fafafa;
      color: #222;
      width: 100%;
    }
    .pred-field input[type="range"] { width: 100%; accent-color: #2563eb; margin: 2px 0; }
    .pred-note { font-size: 0.68rem; color: #aaa; font-style: italic; }
    .pred-num { color: #2563eb; font-weight: bold; }

    .bike-toggle, .view-toggle { display: flex; }
    .view-toggle { width: 100%; }
    .bike-toggle button, .view-toggle button {
      flex: 1;
      font-family: monospace;
      font-size: 0.78rem;
      padding: 5px 8px;
      border: 1px solid #ddd;
      background: #fafafa;
      color: #555;
      cursor: pointer;
    }
    .bike-toggle button:first-child, .view-toggle button:first-child { border-radius: 3px 0 0 3px; }
    .bike-toggle button:last-child, .view-toggle button:last-child { border-radius: 0 3px 3px 0; border-left: none; }
    .bike-toggle button.active, .view-toggle button.active { background: #2563eb; color: #fff; border-color: #2563eb; }

    .pred-results {
      border-top: 1px solid #eee;
      padding-top: 9px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .pred-headline { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .pred-big { display: flex; flex-direction: column; gap: 2px; }
    .pred-big-label { font-size: 0.68rem; color: #888; text-transform: uppercase; letter-spacing: 0.04em; }
    .pred-big-value { font-size: 1rem; color: #222; font-weight: bold; }
    .pred-breakdown { display: flex; flex-direction: column; gap: 5px; }
    .pred-breakdown-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.04em; }
    .pbar-row { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; }
    .pbar-name { width: 76px; color: #555; }
    .pbar-track { flex: 1; height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
    .pbar-fill { display: block; height: 100%; border-radius: 4px; }
    .pbar-val { width: 96px; text-align: right; color: #444; font-variant-numeric: tabular-nums; }

    #climb-info {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .climb-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }

    .chart-title { font-size: 0.78rem; color: #666; text-transform: uppercase; letter-spacing: 0.04em; }
    .chart-note { font-size: 0.7rem; color: #888; font-style: italic; }
    #chart-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
    }
    #elevation-chart {
      width: 100%;
      height: 100%;
      display: block;
    }
    .chart-axis { stroke: #ccc; stroke-width: 1; }
    .chart-line { fill: none; stroke: #2563eb; stroke-width: 2; }
    .chart-fill { fill: rgba(37, 99, 235, 0.12); stroke: none; }
    .chart-tick { font-size: 10px; fill: #888; font-family: monospace; }

    .loading, .error {
      font-size: 0.85rem;
      color: #888;
      padding: 4px 0;
    }
    .error { color: #c0392b; }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo"><img src="/icon.png" alt="">intfnd</a>
  <nav class="tabs">
    <a href="/">Search</a>
    <a href="/explore">Explore</a>
    <a href="/predictor">Predictor</a>
    <a href="/about">About</a>
  </nav>
</header>

<main>
  <div id="map-panel">
    <div id="map"></div>
  </div>

  <div id="info-panel">
    <div id="info-top">
      <a id="back-link" href="/" class="back-link">← back to search</a>
      <div id="climb-info">
        <p class="loading">Loading…</p>
      </div>
    </div>
    <div id="info-bottom">
      <div class="bottom-header">
        <div class="view-toggle" id="view-toggle">
          <button type="button" data-view="chart" class="active">Elevation profile</button>
          <button type="button" data-view="predictor">Performance predictor</button>
        </div>
      </div>
      <div id="chart-view">
        <span class="chart-note">note: elevation data may be inaccurate</span>
        <div id="chart-wrap">
          <svg id="elevation-chart"></svg>
        </div>
      </div>
      <div id="predictor-view" hidden>
        <div id="predictor"></div>
      </div>
    </div>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const climbId = window.location.pathname.split('/').pop();

  if (new URLSearchParams(window.location.search).get('from') === 'explore') {
    const bl = document.getElementById('back-link');
    bl.href = '/explore';
    bl.textContent = '← back to explore';
  }

  const map = L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19,
  }).addTo(map);
  map.setView([51.505, -0.09], 13);

  function decodePolyline(encoded) {
    const pts = [];
    let idx = 0, lat = 0, lng = 0;
    while (idx < encoded.length) {
      let b, shift = 0, result = 0;
      do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
      lat += (result & 1) ? ~(result >> 1) : (result >> 1);
      shift = result = 0;
      do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
      lng += (result & 1) ? ~(result >> 1) : (result >> 1);
      pts.push([lat / 1e5, lng / 1e5]);
    }
    return pts;
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.round(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  function formatDuration(s) {
    s = Math.round(s);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  /* ── performance predictor ──
     Mirrors src/physics.rs: three-force model solved for v via Newton's method.
     η (drivetrain) and g are held constant; ρ derives from temperature, Crr and
     CdA are user-controlled. Keep the constants in sync with physics.rs. */
  const G = 9.81;          // m/s²
  const ETA = 0.95;        // drivetrain efficiency
  const R_AIR = 287.05;    // specific gas constant for dry air, J/(kg·K)
  const P_SEA = 101325;    // assumed sea-level pressure, Pa

  function airDensity(tempC) {
    return P_SEA / (R_AIR * (tempC + 273.15));
  }

  // Returns { time, v, p_eff, p_gravity, p_rolling, p_aero } or null if it doesn't converge.
  function predict(distance_m, grade_pct, weight_kg, power_w, crr, cda, rho) {
    if (power_w <= 0 || distance_m <= 0) return null;
    const grade = grade_pct / 100;
    const p_eff = power_w * ETA;
    const f_gravity = weight_kg * G * grade;
    const f_rolling = weight_kg * G * crr;
    const f_const = f_gravity + f_rolling;

    let v = Math.min(30, Math.max(0.1, f_const > 0 ? p_eff / f_const : 5));
    for (let i = 0; i < 64; i++) {
      const f_aero = 0.5 * rho * cda * v * v;
      const fv = (f_const + f_aero) * v - p_eff;
      const dfv = f_const + 3 * 0.5 * rho * cda * v * v;
      if (Math.abs(dfv) < 1e-12) break;
      const delta = fv / dfv;
      v = Math.max(0.01, v - delta);
      if (Math.abs(delta) < 1e-9) break;
    }
    const f_aero_final = 0.5 * rho * cda * v * v;
    if (Math.abs((f_const + f_aero_final) * v - p_eff) > 1.0) return null;

    return {
      time: distance_m / v,
      v,
      p_eff,
      p_gravity: f_gravity * v,
      p_rolling: f_rolling * v,
      p_aero: f_aero_final * v,
    };
  }

  // Crr presets mirror Strava Sauce. The road/mtb columns match Sauce's anchors
  // exactly for asphalt (0.004/0.0065), gravel (0.006/0.0075), grass (0.007/0.009),
  // off-road (0.02/0.0255) and sand (0.03/0.038); the extra surfaces are interpolated.
  const SURFACES = [
    { key: 'asphalt_smooth', label: 'asphalt — smooth', crr: 0.0040, crrMtb: 0.0065 },
    { key: 'asphalt_worn',   label: 'asphalt — worn',   crr: 0.0045, crrMtb: 0.0068 },
    { key: 'concrete',       label: 'concrete',         crr: 0.0050, crrMtb: 0.0070 },
    { key: 'chipseal',       label: 'chipseal / rough', crr: 0.0055, crrMtb: 0.0072 },
    { key: 'gravel_compact', label: 'gravel — compact', crr: 0.0060, crrMtb: 0.0075 },
    { key: 'grass',          label: 'grass — firm',     crr: 0.0070, crrMtb: 0.0090 },
    { key: 'paving_stones',  label: 'paving stones',    crr: 0.0110, crrMtb: 0.0130 },
    { key: 'cobblestone',    label: 'cobblestone',      crr: 0.0150, crrMtb: 0.0170 },
    { key: 'gravel_loose',   label: 'gravel — loose',   crr: 0.0170, crrMtb: 0.0210 },
    { key: 'dirt',           label: 'off-road / dirt',  crr: 0.0200, crrMtb: 0.0255 },
    { key: 'sand',           label: 'sand / mud',       crr: 0.0300, crrMtb: 0.0380 },
  ];
  const OSM_SURFACE_MAP = {
    asphalt: 'asphalt_smooth', paved: 'asphalt_smooth',
    concrete: 'concrete', 'concrete:plates': 'concrete', 'concrete:lanes': 'concrete',
    chipseal: 'chipseal',
    paving_stones: 'paving_stones',
    sett: 'cobblestone', cobblestone: 'cobblestone', unhewn_cobblestone: 'cobblestone',
    compacted: 'gravel_compact', fine_gravel: 'gravel_compact',
    gravel: 'gravel_loose', pebblestone: 'gravel_loose',
    ground: 'dirt', dirt: 'dirt', earth: 'dirt', unpaved: 'dirt',
    grass: 'grass',
    sand: 'sand', mud: 'sand',
  };
  function defaultSurfaceKey(c) {
    if (c.surfaces) {
      for (const s of c.surfaces) {
        if (OSM_SURFACE_MAP[s]) return OSM_SURFACE_MAP[s];
      }
    }
    return c.is_paved ? 'asphalt_smooth' : 'dirt';
  }

  const BIKES = {
    road: { cda: 0.32 },
    mtb:  { cda: 0.45 },
  };

  function cdaNote(v) {
    if (v <= 0.20) return 'elite time trial — full aero tuck';
    if (v <= 0.27) return 'time trial / triathlon bars';
    if (v <= 0.34) return 'racing, on the drops';
    if (v <= 0.42) return 'road, on the hoods';
    if (v <= 0.52) return 'MTB / gravel, semi-upright';
    return 'upright casual / commuter';
  }

  function renderPredictor(c) {
    const surfKey = defaultSurfaceKey(c);
    const surf = SURFACES.find(s => s.key === surfKey) || SURFACES[0];

    // prefill weight/power when arriving from the search tab (e.g. ?weight=83&power=280)
    const params = new URLSearchParams(window.location.search);
    const weightDefault = parseFloat(params.get('weight')) > 0 ? params.get('weight') : '78';
    const powerDefault = parseFloat(params.get('power')) > 0 ? params.get('power') : '250';

    document.getElementById('predictor').innerHTML = `
      <div class="predictor">
        <div class="pred-controls">
          <div class="pred-field">
            <label>bike</label>
            <div class="bike-toggle" id="p-bike">
              <button type="button" data-bike="road" class="active">Road</button>
              <button type="button" data-bike="mtb">MTB</button>
            </div>
          </div>
          <div class="pred-row">
            <div class="pred-field">
              <label>weight — rider + bike (kg)</label>
              <input type="number" id="p-weight" min="30" max="200" step="0.5" value="${weightDefault}">
            </div>
            <div class="pred-field">
              <label>power (W)</label>
              <input type="number" id="p-power" min="50" max="800" step="5" value="${powerDefault}">
            </div>
          </div>
          <div class="pred-row">
            <div class="pred-field">
              <label>surface</label>
              <select id="p-surface">
                ${SURFACES.map(s => `<option value="${s.key}" ${s.key === surf.key ? 'selected' : ''}>${s.label}</option>`).join('')}
              </select>
            </div>
            <div class="pred-field">
              <label>rolling resistance — Crr</label>
              <input type="number" id="p-crr" min="0.002" max="0.05" step="0.0005" value="${surf.crr.toFixed(4)}">
            </div>
          </div>
          <div class="pred-field">
            <label>aerodynamics — CdA <span class="pred-num" id="p-cda-val">0.32</span> m²</label>
            <input type="range" id="p-cda" min="0.15" max="0.7" step="0.01" value="0.32">
            <span class="pred-note" id="p-cda-note">${cdaNote(0.32)}</span>
          </div>
          <div class="pred-field">
            <label>temperature <span class="pred-num" id="p-temp-val">15</span> °C → air density ρ <span class="pred-num" id="p-rho-val">1.225</span> kg/m³</label>
            <input type="range" id="p-temp" min="-10" max="40" step="1" value="15">
          </div>
        </div>
        <div class="pred-results" id="pred-results"></div>
      </div>
    `;

    const recompute = () => {
      const weight = parseFloat(document.getElementById('p-weight').value);
      const power = parseFloat(document.getElementById('p-power').value);
      const crr = parseFloat(document.getElementById('p-crr').value);
      const cda = parseFloat(document.getElementById('p-cda').value);
      const tempC = parseFloat(document.getElementById('p-temp').value);
      const rho = airDensity(tempC);

      document.getElementById('p-cda-val').textContent = cda.toFixed(2);
      document.getElementById('p-cda-note').textContent = cdaNote(cda);
      document.getElementById('p-temp-val').textContent = tempC.toFixed(0);
      document.getElementById('p-rho-val').textContent = rho.toFixed(3);

      const out = document.getElementById('pred-results');
      if (!Number.isFinite(weight) || !Number.isFinite(power) || !Number.isFinite(crr) || weight <= 0 || power <= 0) {
        out.innerHTML = '<p class="pred-note">enter weight, power and Crr.</p>';
        return;
      }
      const res = predict(c.distance, c.average_grade, weight, power, crr, cda, rho);
      if (!res) {
        out.innerHTML = '<p class="pred-note">model does not converge for these inputs.</p>';
        return;
      }

      const drivetrain = power - res.p_eff;
      const parts = [
        { name: 'gravity', w: res.p_gravity, color: '#2563eb' },
        { name: 'rolling', w: res.p_rolling, color: '#e08a2b' },
        { name: 'aero', w: res.p_aero, color: '#14a06a' },
        { name: 'drivetrain', w: drivetrain, color: '#aaa' },
      ];
      const bars = parts.map(p => {
        const pct = power > 0 ? Math.max(0, p.w) / power * 100 : 0;
        return `
          <div class="pbar-row">
            <span class="pbar-name">${p.name}</span>
            <span class="pbar-track"><span class="pbar-fill" style="width:${pct.toFixed(1)}%;background:${p.color}"></span></span>
            <span class="pbar-val">${p.w.toFixed(0)} W · ${pct.toFixed(0)}%</span>
          </div>`;
      }).join('');

      out.innerHTML = `
        <div class="pred-headline">
          <div class="pred-big">
            <span class="pred-big-label">time</span>
            <span class="pred-big-value">${formatDuration(res.time)}</span>
          </div>
          <div class="pred-big">
            <span class="pred-big-label">speed</span>
            <span class="pred-big-value">${(res.v * 3.6).toFixed(1)} km/h</span>
          </div>
          <div class="pred-big">
            <span class="pred-big-label">power-to-weight</span>
            <span class="pred-big-value">${(power / weight).toFixed(2)} W/kg</span>
          </div>
        </div>
        <div class="pred-breakdown">
          <span class="pred-breakdown-label">power breakdown (share of ${power.toFixed(0)} W at the pedals)</span>
          ${bars}
        </div>
      `;
    };

    // recompute Crr from the surface preset scaled by the selected bike's tyre factor
    const currentBike = () => {
      const btn = document.querySelector('#p-bike button.active');
      return btn ? btn.dataset.bike : 'road';
    };
    const applyCrr = () => {
      const s = SURFACES.find(x => x.key === document.getElementById('p-surface').value);
      if (!s) return;
      const crr = currentBike() === 'mtb' ? s.crrMtb : s.crr;
      document.getElementById('p-crr').value = crr.toFixed(4);
    };

    // surface preset overwrites Crr; manual Crr edits are then free to diverge
    document.getElementById('p-surface').addEventListener('change', () => {
      applyCrr();
      recompute();
    });
    document.getElementById('p-bike').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-bike]');
      if (!btn) return;
      document.querySelectorAll('#p-bike button').forEach(b => b.classList.toggle('active', b === btn));
      document.getElementById('p-cda').value = BIKES[btn.dataset.bike].cda;
      applyCrr();
      recompute();
    });
    ['p-weight', 'p-power', 'p-crr', 'p-cda', 'p-temp'].forEach(id => {
      document.getElementById(id).addEventListener('input', recompute);
    });

    recompute();
  }

  function renderInfo(c) {
    const surfaceLabel = c.is_paved ? 'paved' : 'unpaved';
    const directionLabel = c.bidirectional ? 'bidirectional' : 'one-way';
    const directionClass = c.bidirectional ? 'direction-bidi' : 'direction-oneway';
    const distanceKm = (c.distance / 1000).toFixed(2);
    const elev = c.elevation_profile || [];
    const elevGain = elev.length >= 2
      ? Math.max(0, elev[elev.length - 1] - elev[0])
      : null;

    const surfacesHtml = (c.surfaces && c.surfaces.length)
      ? `
        <div class="surfaces-list">
          <span class="surfaces-label">surfaces</span>
          <div class="surfaces-tags">
            ${c.surfaces.map(s => `<span class="surface-pill">${s}</span>`).join('')}
          </div>
        </div>`
      : '';

    const osmHtml = (c.osm_way_ids && c.osm_way_ids.length)
      ? `
        <details class="osm-source">
          <summary class="osm-source-label">OSM source <span class="osm-count">(${c.osm_way_ids.length})</span></summary>
          <div class="osm-links">
            ${c.osm_way_ids.map(id => `<a class="osm-link" href="https://www.openstreetmap.org/way/${id}" target="_blank" rel="noopener">way ${id}</a>`).join('')}
          </div>
        </details>`
      : '';

    document.getElementById('climb-info').innerHTML = `
      <div class="climb-header">
        <span class="climb-name">${c.name}</span>
        <div class="climb-tags">
          <span class="surface-tag surface-${surfaceLabel}">${surfaceLabel}</span>
          <span class="direction-tag ${directionClass}">${directionLabel}</span>
        </div>
      </div>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">distance</span>
          <span class="stat-value">${distanceKm} km</span>
        </div>
        <div class="stat">
          <span class="stat-label">avg grade</span>
          <span class="stat-value">${c.average_grade.toFixed(1)}%</span>
        </div>
        <div class="stat">
          <span class="stat-label">elev gain</span>
          <span class="stat-value">${elevGain !== null ? elevGain.toFixed(0) + ' m' : '—'}</span>
        </div>
        <div class="stat">
          <span class="stat-label">score</span>
          <span class="stat-value">${Math.trunc(c.score)}</span>
        </div>
      </div>
      <p class="score-note">score (0–inf, lower is better) reflects climb quality — penalises intersections, traffic signals, uneven gradient and sharp turns.</p>
      ${surfacesHtml}
      ${osmHtml}
    `;
  }

  function renderMap(c) {
    if (c.polyline) {
      const pts = decodePolyline(c.polyline);
      climbPts = pts;
      if (pts.length) {
        const line = L.polyline(pts, {
          color: '#2563eb',
          weight: 4,
          opacity: 0.9,
        }).addTo(map);
        map.fitBounds(line.getBounds(), { padding: [30, 30] });
      }
    }
    L.circleMarker([c.start_lat, c.start_lng], {
      radius: 6,
      color: '#fff',
      fillColor: '#2563eb',
      fillOpacity: 1,
      weight: 2,
    }).addTo(map);
    if (!c.polyline) {
      map.setView([c.start_lat, c.start_lng], 14);
    }
  }

  function renderChart(elev, distance) {
    const svg = document.getElementById('elevation-chart');
    svg.innerHTML = '';
    if (!elev || elev.length < 2) {
      svg.innerHTML = `<text x="50%" y="50%" text-anchor="middle" class="chart-tick">no elevation data</text>`;
      return;
    }
    const rect = svg.getBoundingClientRect();
    const W = rect.width;
    const H = rect.height;
    const padL = 38, padR = 8, padT = 8, padB = 22;
    const innerW = Math.max(1, W - padL - padR);
    const innerH = Math.max(1, H - padT - padB);

    let minY = Infinity, maxY = -Infinity;
    for (const v of elev) { if (v < minY) minY = v; if (v > maxY) maxY = v; }
    if (minY === maxY) { minY -= 1; maxY += 1; }
    const range = maxY - minY;

    const n = elev.length;
    const xAt = i => padL + (n === 1 ? 0 : (i / (n - 1)) * innerW);
    const yAt = v => padT + (1 - (v - minY) / range) * innerH;

    let path = `M ${xAt(0)} ${yAt(elev[0])}`;
    for (let i = 1; i < n; i++) path += ` L ${xAt(i)} ${yAt(elev[i])}`;
    const fillPath = path + ` L ${xAt(n - 1)} ${padT + innerH} L ${xAt(0)} ${padT + innerH} Z`;

    const distanceKm = distance / 1000;
    const xTicks = [
      { frac: 0, label: '0 km' },
      { frac: 0.5, label: (distanceKm / 2).toFixed(1) + ' km' },
      { frac: 1, label: distanceKm.toFixed(1) + ' km' },
    ];
    const yTicks = [
      { v: minY, label: minY.toFixed(0) + ' m' },
      { v: (minY + maxY) / 2, label: ((minY + maxY) / 2).toFixed(0) + ' m' },
      { v: maxY, label: maxY.toFixed(0) + ' m' },
    ];

    let svgInner = '';
    svgInner += `<line class="chart-axis" x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + innerH}"/>`;
    svgInner += `<line class="chart-axis" x1="${padL}" y1="${padT + innerH}" x2="${padL + innerW}" y2="${padT + innerH}"/>`;
    for (const t of yTicks) {
      const y = yAt(t.v);
      svgInner += `<text class="chart-tick" x="${padL - 4}" y="${y + 3}" text-anchor="end">${t.label}</text>`;
    }
    for (const t of xTicks) {
      const x = padL + t.frac * innerW;
      svgInner += `<text class="chart-tick" x="${x}" y="${padT + innerH + 14}" text-anchor="middle">${t.label}</text>`;
    }
    svgInner += `<path class="chart-fill" d="${fillPath}"/>`;
    svgInner += `<path class="chart-line" d="${path}"/>`;
    svgInner += `<line id="cursor-line" x1="0" y1="${padT}" x2="0" y2="${padT + innerH}" stroke="#555" stroke-width="1" stroke-dasharray="3,3" opacity="0" pointer-events="none"/>`;
    svgInner += `<circle id="cursor-dot" r="3" fill="#2563eb" stroke="#fff" stroke-width="1.5" opacity="0" pointer-events="none"/>`;
    svgInner += `<text id="cursor-grade" x="0" y="${padT + 12}" text-anchor="middle" font-size="10" fill="#222" font-family="monospace" font-weight="bold" opacity="0" pointer-events="none"></text>`;
    svgInner += `<rect id="chart-overlay" x="${padL}" y="${padT}" width="${innerW}" height="${innerH}" fill="transparent" style="cursor:crosshair"/>`;
    svg.innerHTML = svgInner;

    const stepDist = distance / (n - 1);
    const overlay = document.getElementById('chart-overlay');
    const cursorLine = document.getElementById('cursor-line');
    const cursorDot = document.getElementById('cursor-dot');
    const cursorGrade = document.getElementById('cursor-grade');

    overlay.addEventListener('mousemove', (e) => {
      const svgRect = svg.getBoundingClientRect();
      const frac = Math.min(1, Math.max(0, (e.clientX - svgRect.left - padL) / innerW));
      const floatIdx = frac * (n - 1);
      const idx = Math.min(n - 2, Math.floor(floatIdx));
      const t = floatIdx - idx;
      const elevAtX = elev[idx] * (1 - t) + elev[idx + 1] * t;
      const grade = (elev[idx + 1] - elev[idx]) / stepDist * 100;

      const x = padL + frac * innerW;
      const y = yAt(elevAtX);
      const labelX = Math.min(padL + innerW - 16, Math.max(padL + 16, x));

      cursorLine.setAttribute('x1', x); cursorLine.setAttribute('x2', x); cursorLine.setAttribute('opacity', '1');
      cursorDot.setAttribute('cx', x); cursorDot.setAttribute('cy', y); cursorDot.setAttribute('opacity', '1');
      cursorGrade.setAttribute('x', labelX); cursorGrade.setAttribute('opacity', '1');
      cursorGrade.textContent = grade.toFixed(1) + '%';

      const pos = getPointAtFrac(climbPts, frac);
      if (pos) {
        if (!chartMarker) {
          chartMarker = L.circleMarker(pos, { radius: 5, color: '#fff', fillColor: '#222', fillOpacity: 1, weight: 2 }).addTo(map);
        } else {
          chartMarker.setLatLng(pos);
        }
      }
    });

    overlay.addEventListener('mouseleave', () => {
      cursorLine.setAttribute('opacity', '0');
      cursorDot.setAttribute('opacity', '0');
      cursorGrade.setAttribute('opacity', '0');
      if (chartMarker) { chartMarker.remove(); chartMarker = null; }
    });
  }

  let currentClimb = null;
  let climbPts = null;
  let chartMarker = null;

  function getPointAtFrac(pts, frac) {
    if (!pts || pts.length < 2) return null;
    const cum = [0];
    for (let i = 1; i < pts.length; i++) {
      const dlat = pts[i][0] - pts[i-1][0];
      const dlng = pts[i][1] - pts[i-1][1];
      cum.push(cum[cum.length-1] + Math.sqrt(dlat*dlat + dlng*dlng));
    }
    const total = cum[cum.length-1];
    if (total === 0) return pts[0];
    const target = Math.min(total, frac * total);
    for (let i = 1; i < pts.length; i++) {
      if (cum[i] >= target) {
        const t = (target - cum[i-1]) / (cum[i] - cum[i-1]);
        return [pts[i-1][0] + t * (pts[i][0] - pts[i-1][0]), pts[i-1][1] + t * (pts[i][1] - pts[i-1][1])];
      }
    }
    return pts[pts.length-1];
  }

  async function load() {
    try {
      const res = await fetch(`/api/climb/${climbId}`);
      if (res.status === 404) {
        document.getElementById('climb-info').innerHTML = '<p class="error">⚠ Climb not found.</p>';
        return;
      }
      if (!res.ok) throw new Error('request failed');
      const c = await res.json();
      currentClimb = c;
      document.title = `intfnd · ${c.name}`;
      renderInfo(c);
      renderPredictor(c);
      renderMap(c);
      renderChart(c.elevation_profile, c.distance);
    } catch {
      document.getElementById('climb-info').innerHTML = '<p class="error">⚠ Failed to load climb.</p>';
    }
  }

  // ── bottom panel: swap elevation chart ⇄ performance predictor ──
  let predictorOpen = false;
  (function setupToggle() {
    const toggle = document.getElementById('view-toggle');
    const bottom = document.getElementById('info-bottom');
    const chartView = document.getElementById('chart-view');
    const predictorView = document.getElementById('predictor-view');

    function setView(open) {
      predictorOpen = open;
      bottom.classList.toggle('predictor-active', open);
      chartView.hidden = open;
      predictorView.hidden = !open;
      toggle.querySelectorAll('button').forEach(b =>
        b.classList.toggle('active', (b.dataset.view === 'predictor') === open));
      // chart can't measure itself while hidden, and the panel resizes with a
      // transition — so re-render only once the panel has settled at its height
      if (!open && currentClimb) {
        const redraw = () => renderChart(currentClimb.elevation_profile, currentClimb.distance);
        let done = false;
        const fire = () => { if (!done) { done = true; redraw(); } };
        bottom.addEventListener('transitionend', function te(e) {
          if (e.propertyName === 'flex-basis') {
            bottom.removeEventListener('transitionend', te);
            fire();
          }
        });
        setTimeout(fire, 250); // fallback if transitionend doesn't fire
      }
    }

    toggle.addEventListener('click', (e) => {
      const b = e.target.closest('button[data-view]');
      if (!b) return;
      const open = b.dataset.view === 'predictor';
      if (open !== predictorOpen) setView(open);
    });
  })();

  window.addEventListener('resize', () => {
    if (currentClimb && !predictorOpen) renderChart(currentClimb.elevation_profile, currentClimb.distance);
  });

  load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>intfnd · climb</title>
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 1.1rem; font-weight: bold; color: #222; text-decoration: none; }
    .logo img { width: 24px; height: 24px; }
    nav.tabs { display: flex; gap: 4px; }
    nav.tabs a {
      padding: 6px 14px;
      font-size: 0.85rem;
      color: #555;
      text-decoration: none;
      border-radius: 4px;
    }
    nav.tabs a:hover { background: #f4f4f4; color: #222; }
    nav.tabs a.active { background: #2563eb; color: #fff; }

    /* ── main ── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── map panel ── */
    #map-panel {
      display: flex;
      flex-direction: column;
      flex: 0 0 62%;
      border-right: 1px solid #ddd;
    }
    #map { flex: 1; }

    /* ── info panel ── */
    #info-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #info-top {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #info-bottom {
      flex: 0 0 38%;
      border-top: 1px solid #ddd;
      background: #fff;
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .back-link {
      font-size: 0.8rem;
      color: #2563eb;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }

    .climb-name {
      font-size: 1.2rem;
      font-weight: bold;
      color: #222;
    }

    .surface-tag {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .surface-paved { background: #eef; color: #335; }
    .surface-unpaved { background: #f5ecdf; color: #7a4a1c; }

    .direction-tag {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .direction-bidi { background: #e7f4ea; color: #2d6a3a; }
    .direction-oneway { background: #f4ece7; color: #6a3a2d; }

    .climb-tags { display: flex; gap: 4px; flex-wrap: wrap; flex-shrink: 0; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-label { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 0.95rem; color: #222; font-weight: bold; }

    .score-note {
      font-size: 0.72rem;
      color: #888;
      line-height: 1.4;
      padding: 0 2px;
      opacity: 0.85;
    }

    .surfaces-list {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .surfaces-label { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.04em; }
    .surfaces-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .surface-pill {
      font-size: 0.72rem;
      padding: 2px 6px;
      border-radius: 3px;
      background: #f4f4f4;
      color: #555;
      border: 1px solid #e4e4e4;
    }

    .osm-source {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px 10px;
    }
    .osm-source-label {
      font-size: 0.72rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }
    .osm-source-label::-webkit-details-marker { display: none; }
    .osm-source-label::before {
      content: '▸';
      font-size: 0.7rem;
      transition: transform 0.15s ease;
    }
    .osm-source[open] > .osm-source-label::before { transform: rotate(90deg); }
    .osm-source-label:hover { color: #555; }
    .osm-count { color: #bbb; }
    .osm-links { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .osm-link {
      font-size: 0.72rem;
      padding: 2px 6px;
      border-radius: 3px;
      background: #fff5ef;
      color: #2563eb;
      border: 1px solid #fcd9c5;
      text-decoration: none;
    }
    .osm-link:hover { background: #2563eb; color: #fff; border-color: #2563eb; }

    #climb-info {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .climb-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }

    .chart-title { font-size: 0.78rem; color: #666; text-transform: uppercase; letter-spacing: 0.04em; }
    .chart-note { font-size: 0.7rem; color: #888; font-style: italic; }
    #chart-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
    }
    #elevation-chart {
      width: 100%;
      height: 100%;
      display: block;
    }
    .chart-axis { stroke: #ccc; stroke-width: 1; }
    .chart-line { fill: none; stroke: #2563eb; stroke-width: 2; }
    .chart-fill { fill: rgba(37, 99, 235, 0.12); stroke: none; }
    .chart-tick { font-size: 10px; fill: #888; font-family: monospace; }

    .loading, .error {
      font-size: 0.85rem;
      color: #888;
      padding: 4px 0;
    }
    .error { color: #c0392b; }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo"><img src="/icon.png" alt="">intfnd</a>
  <nav class="tabs">
    <a href="/" class="active">Search</a>
    <a href="/explore">Explore</a>
    <a href="/about">About</a>
  </nav>
</header>

<main>
  <div id="map-panel">
    <div id="map"></div>
  </div>

  <div id="info-panel">
    <div id="info-top">
      <a id="back-link" href="/" class="back-link">← back to search</a>
      <div id="climb-info">
        <p class="loading">Loading…</p>
      </div>
    </div>
    <div id="info-bottom">
      <span class="chart-title">Elevation profile</span>
      <span class="chart-note">note: elevation data may be inaccurate</span>
      <div id="chart-wrap">
        <svg id="elevation-chart"></svg>
      </div>
    </div>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const climbId = window.location.pathname.split('/').pop();

  if (new URLSearchParams(window.location.search).get('from') === 'explore') {
    const bl = document.getElementById('back-link');
    bl.href = '/explore';
    bl.textContent = '← back to explore';
  }

  const map = L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19,
  }).addTo(map);
  map.setView([51.505, -0.09], 13);

  function decodePolyline(encoded) {
    const pts = [];
    let idx = 0, lat = 0, lng = 0;
    while (idx < encoded.length) {
      let b, shift = 0, result = 0;
      do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
      lat += (result & 1) ? ~(result >> 1) : (result >> 1);
      shift = result = 0;
      do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
      lng += (result & 1) ? ~(result >> 1) : (result >> 1);
      pts.push([lat / 1e5, lng / 1e5]);
    }
    return pts;
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.round(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  function renderInfo(c) {
    const surfaceLabel = c.is_paved ? 'paved' : 'unpaved';
    const directionLabel = c.bidirectional ? 'bidirectional' : 'one-way';
    const directionClass = c.bidirectional ? 'direction-bidi' : 'direction-oneway';
    const distanceKm = (c.distance / 1000).toFixed(2);
    const elev = c.elevation_profile || [];
    const elevGain = elev.length >= 2
      ? Math.max(0, elev[elev.length - 1] - elev[0])
      : null;

    const surfacesHtml = (c.surfaces && c.surfaces.length)
      ? `
        <div class="surfaces-list">
          <span class="surfaces-label">surfaces</span>
          <div class="surfaces-tags">
            ${c.surfaces.map(s => `<span class="surface-pill">${s}</span>`).join('')}
          </div>
        </div>`
      : '';

    const osmHtml = (c.osm_way_ids && c.osm_way_ids.length)
      ? `
        <details class="osm-source">
          <summary class="osm-source-label">OSM source <span class="osm-count">(${c.osm_way_ids.length})</span></summary>
          <div class="osm-links">
            ${c.osm_way_ids.map(id => `<a class="osm-link" href="https://www.openstreetmap.org/way/${id}" target="_blank" rel="noopener">way ${id}</a>`).join('')}
          </div>
        </details>`
      : '';

    document.getElementById('climb-info').innerHTML = `
      <div class="climb-header">
        <span class="climb-name">${c.name}</span>
        <div class="climb-tags">
          <span class="surface-tag surface-${surfaceLabel}">${surfaceLabel}</span>
          <span class="direction-tag ${directionClass}">${directionLabel}</span>
        </div>
      </div>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">distance</span>
          <span class="stat-value">${distanceKm} km</span>
        </div>
        <div class="stat">
          <span class="stat-label">avg grade</span>
          <span class="stat-value">${c.average_grade.toFixed(1)}%</span>
        </div>
        <div class="stat">
          <span class="stat-label">elev gain</span>
          <span class="stat-value">${elevGain !== null ? elevGain.toFixed(0) + ' m' : '—'}</span>
        </div>
        <div class="stat">
          <span class="stat-label">score</span>
          <span class="stat-value">${Math.trunc(c.score)}</span>
        </div>
      </div>
      <p class="score-note">score (0–inf, lower is better) reflects climb quality — penalises intersections, traffic signals, uneven gradient and sharp turns.</p>
      ${surfacesHtml}
      ${osmHtml}
    `;
  }

  function renderMap(c) {
    if (c.polyline) {
      const pts = decodePolyline(c.polyline);
      climbPts = pts;
      if (pts.length) {
        const line = L.polyline(pts, {
          color: '#2563eb',
          weight: 4,
          opacity: 0.9,
        }).addTo(map);
        map.fitBounds(line.getBounds(), { padding: [30, 30] });
      }
    }
    L.circleMarker([c.start_lat, c.start_lng], {
      radius: 6,
      color: '#fff',
      fillColor: '#2563eb',
      fillOpacity: 1,
      weight: 2,
    }).addTo(map);
    if (!c.polyline) {
      map.setView([c.start_lat, c.start_lng], 14);
    }
  }

  function renderChart(elev, distance) {
    const svg = document.getElementById('elevation-chart');
    svg.innerHTML = '';
    if (!elev || elev.length < 2) {
      svg.innerHTML = `<text x="50%" y="50%" text-anchor="middle" class="chart-tick">no elevation data</text>`;
      return;
    }
    const rect = svg.getBoundingClientRect();
    const W = rect.width;
    const H = rect.height;
    const padL = 38, padR = 8, padT = 8, padB = 22;
    const innerW = Math.max(1, W - padL - padR);
    const innerH = Math.max(1, H - padT - padB);

    let minY = Infinity, maxY = -Infinity;
    for (const v of elev) { if (v < minY) minY = v; if (v > maxY) maxY = v; }
    if (minY === maxY) { minY -= 1; maxY += 1; }
    const range = maxY - minY;

    const n = elev.length;
    const xAt = i => padL + (n === 1 ? 0 : (i / (n - 1)) * innerW);
    const yAt = v => padT + (1 - (v - minY) / range) * innerH;

    let path = `M ${xAt(0)} ${yAt(elev[0])}`;
    for (let i = 1; i < n; i++) path += ` L ${xAt(i)} ${yAt(elev[i])}`;
    const fillPath = path + ` L ${xAt(n - 1)} ${padT + innerH} L ${xAt(0)} ${padT + innerH} Z`;

    const distanceKm = distance / 1000;
    const xTicks = [
      { frac: 0, label: '0 km' },
      { frac: 0.5, label: (distanceKm / 2).toFixed(1) + ' km' },
      { frac: 1, label: distanceKm.toFixed(1) + ' km' },
    ];
    const yTicks = [
      { v: minY, label: minY.toFixed(0) + ' m' },
      { v: (minY + maxY) / 2, label: ((minY + maxY) / 2).toFixed(0) + ' m' },
      { v: maxY, label: maxY.toFixed(0) + ' m' },
    ];

    let svgInner = '';
    svgInner += `<line class="chart-axis" x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + innerH}"/>`;
    svgInner += `<line class="chart-axis" x1="${padL}" y1="${padT + innerH}" x2="${padL + innerW}" y2="${padT + innerH}"/>`;
    for (const t of yTicks) {
      const y = yAt(t.v);
      svgInner += `<text class="chart-tick" x="${padL - 4}" y="${y + 3}" text-anchor="end">${t.label}</text>`;
    }
    for (const t of xTicks) {
      const x = padL + t.frac * innerW;
      svgInner += `<text class="chart-tick" x="${x}" y="${padT + innerH + 14}" text-anchor="middle">${t.label}</text>`;
    }
    svgInner += `<path class="chart-fill" d="${fillPath}"/>`;
    svgInner += `<path class="chart-line" d="${path}"/>`;
    svgInner += `<line id="cursor-line" x1="0" y1="${padT}" x2="0" y2="${padT + innerH}" stroke="#555" stroke-width="1" stroke-dasharray="3,3" opacity="0" pointer-events="none"/>`;
    svgInner += `<circle id="cursor-dot" r="3" fill="#2563eb" stroke="#fff" stroke-width="1.5" opacity="0" pointer-events="none"/>`;
    svgInner += `<text id="cursor-grade" x="0" y="${padT + 12}" text-anchor="middle" font-size="10" fill="#222" font-family="monospace" font-weight="bold" opacity="0" pointer-events="none"></text>`;
    svgInner += `<rect id="chart-overlay" x="${padL}" y="${padT}" width="${innerW}" height="${innerH}" fill="transparent" style="cursor:crosshair"/>`;
    svg.innerHTML = svgInner;

    const stepDist = distance / (n - 1);
    const overlay = document.getElementById('chart-overlay');
    const cursorLine = document.getElementById('cursor-line');
    const cursorDot = document.getElementById('cursor-dot');
    const cursorGrade = document.getElementById('cursor-grade');

    overlay.addEventListener('mousemove', (e) => {
      const svgRect = svg.getBoundingClientRect();
      const frac = Math.min(1, Math.max(0, (e.clientX - svgRect.left - padL) / innerW));
      const floatIdx = frac * (n - 1);
      const idx = Math.min(n - 2, Math.floor(floatIdx));
      const t = floatIdx - idx;
      const elevAtX = elev[idx] * (1 - t) + elev[idx + 1] * t;
      const grade = (elev[idx + 1] - elev[idx]) / stepDist * 100;

      const x = padL + frac * innerW;
      const y = yAt(elevAtX);
      const labelX = Math.min(padL + innerW - 16, Math.max(padL + 16, x));

      cursorLine.setAttribute('x1', x); cursorLine.setAttribute('x2', x); cursorLine.setAttribute('opacity', '1');
      cursorDot.setAttribute('cx', x); cursorDot.setAttribute('cy', y); cursorDot.setAttribute('opacity', '1');
      cursorGrade.setAttribute('x', labelX); cursorGrade.setAttribute('opacity', '1');
      cursorGrade.textContent = grade.toFixed(1) + '%';

      const pos = getPointAtFrac(climbPts, frac);
      if (pos) {
        if (!chartMarker) {
          chartMarker = L.circleMarker(pos, { radius: 5, color: '#fff', fillColor: '#222', fillOpacity: 1, weight: 2 }).addTo(map);
        } else {
          chartMarker.setLatLng(pos);
        }
      }
    });

    overlay.addEventListener('mouseleave', () => {
      cursorLine.setAttribute('opacity', '0');
      cursorDot.setAttribute('opacity', '0');
      cursorGrade.setAttribute('opacity', '0');
      if (chartMarker) { chartMarker.remove(); chartMarker = null; }
    });
  }

  let currentClimb = null;
  let climbPts = null;
  let chartMarker = null;

  function getPointAtFrac(pts, frac) {
    if (!pts || pts.length < 2) return null;
    const cum = [0];
    for (let i = 1; i < pts.length; i++) {
      const dlat = pts[i][0] - pts[i-1][0];
      const dlng = pts[i][1] - pts[i-1][1];
      cum.push(cum[cum.length-1] + Math.sqrt(dlat*dlat + dlng*dlng));
    }
    const total = cum[cum.length-1];
    if (total === 0) return pts[0];
    const target = Math.min(total, frac * total);
    for (let i = 1; i < pts.length; i++) {
      if (cum[i] >= target) {
        const t = (target - cum[i-1]) / (cum[i] - cum[i-1]);
        return [pts[i-1][0] + t * (pts[i][0] - pts[i-1][0]), pts[i-1][1] + t * (pts[i][1] - pts[i-1][1])];
      }
    }
    return pts[pts.length-1];
  }

  async function load() {
    try {
      const res = await fetch(`/api/climb/${climbId}`);
      if (res.status === 404) {
        document.getElementById('climb-info').innerHTML = '<p class="error">⚠ Climb not found.</p>';
        return;
      }
      if (!res.ok) throw new Error('request failed');
      const c = await res.json();
      currentClimb = c;
      document.title = `intfnd · ${c.name}`;
      renderInfo(c);
      renderMap(c);
      renderChart(c.elevation_profile, c.distance);
    } catch {
      document.getElementById('climb-info').innerHTML = '<p class="error">⚠ Failed to load climb.</p>';
    }
  }

  window.addEventListener('resize', () => {
    if (currentClimb) renderChart(currentClimb.elevation_profile, currentClimb.distance);
  });

  load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>intfnd</title>
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 1.1rem; font-weight: bold; color: #222; text-decoration: none; }
    .logo img { width: 24px; height: 24px; }
    nav.tabs { display: flex; gap: 4px; }
    nav.tabs a {
      padding: 6px 14px;
      font-size: 0.85rem;
      color: #555;
      text-decoration: none;
      border-radius: 4px;
    }
    nav.tabs a:hover { background: #f4f4f4; color: #222; }
    nav.tabs a.active { background: #fc4c02; color: #fff; }

    /* ── main ── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── map panel ── */
    #map-panel {
      display: flex;
      flex-direction: column;
      flex: 0 0 62%;
      border-right: 1px solid #ddd;
    }
    .map-hint {
      padding: 8px 14px;
      font-size: 0.78rem;
      color: #666;
      background: #fafafa;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }
    #map { flex: 1; }

    /* ── form panel ── */
    #form-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 18px;
      overflow-y: auto;
      gap: 14px;
    }

    .field { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 0.8rem; color: #555; }
    input[type=number] {
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.9rem;
      background: #fff;
      width: 100%;
    }
    input[type=number]:focus { outline: none; border-color: #fc4c02; }

    #find-btn {
      padding: 10px;
      background: #fc4c02;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    #find-btn:hover:not(:disabled) { background: #e04400; }
    #find-btn:disabled { opacity: 0.6; cursor: default; }

    #warnings { display: flex; flex-direction: column; gap: 4px; }
    .warn { font-size: 0.8rem; color: #c0392b; }

    /* ── results ── */
    #results { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .result-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px 12px;
    }
    .result-header { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    .result-name { font-size: 0.9rem; font-weight: bold; color: #222; text-decoration: none; }
    .result-name:hover { color: #fc4c02; text-decoration: underline; }
    .surface-tag {
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .surface-paved { background: #eef; color: #335; }
    .surface-unpaved { background: #f5ecdf; color: #7a4a1c; }
    .result-meta { font-size: 0.78rem; color: #666; margin-top: 4px; }
    .no-results { font-size: 0.85rem; color: #888; }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #555;
      cursor: pointer;
      user-select: none;
    }
    .toggle input { accent-color: #fc4c02; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo"><img src="/icon.png" alt="">intfnd</a>
  <nav class="tabs">
    <a href="/" class="active">Search</a>
    <a href="/about">About</a>
    <a href="#">Explore</a>
  </nav>
</header>

<main>
  <div id="map-panel">
    <p class="map-hint">double-click to place a pin (2 km radius) &nbsp;·&nbsp; double-click and drag to set a custom radius</p>
    <div id="map"></div>
  </div>

  <div id="form-panel">
    <div class="field">
      <label for="weight">system weight (kg)</label>
      <input id="weight" type="number" min="1" step="0.1" placeholder="e.g. 83">
    </div>
    <div class="field">
      <label for="power">power (W)</label>
      <input id="power" type="number" min="1" placeholder="e.g. 280">
    </div>
    <div class="field">
      <label for="interval">interval (s)</label>
      <input id="interval" type="number" min="1" placeholder="e.g. 300">
    </div>
    <div id="warnings"></div>
    <button id="find-btn">find</button>
    <label class="toggle">
      <input id="paved-only" type="checkbox">
      paved only
    </label>
    <div id="results"></div>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ── map setup ──────────────────────────────────────────────
  const map = L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19,
  }).addTo(map);

  const SAVED_KEY = 'intfnd:lastSearch';
  const saved = (() => {
    try { return JSON.parse(sessionStorage.getItem(SAVED_KEY)); }
    catch { return null; }
  })();

  if (saved && saved.pin) {
    map.setView([saved.pin.lat, saved.pin.lng], 13);
  } else if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      p => map.setView([p.coords.latitude, p.coords.longitude], 13),
      () => map.setView([51.505, -0.09], 13)
    );
  } else {
    map.setView([51.505, -0.09], 13);
  }

  // ── pin + circle ───────────────────────────────────────────
  let pinLatLng = null;
  let circleRadius = 2000;
  let marker = null;
  let circle = null;
  let isDragging = false;
  let dragStart = null;
  let hoverLayers = [];

  function clearHover() {
    hoverLayers.forEach(l => l.remove());
    hoverLayers = [];
  }

  function decodePolyline(encoded) {
    const pts = [];
    let idx = 0, lat = 0, lng = 0;
    while (idx < encoded.length) {
      let b, shift = 0, result = 0;
      do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
      lat += (result & 1) ? ~(result >> 1) : (result >> 1);
      shift = result = 0;
      do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
      lng += (result & 1) ? ~(result >> 1) : (result >> 1);
      pts.push([lat / 1e5, lng / 1e5]);
    }
    return pts;
  }

  function placePin(latlng, radius) {
    if (marker) marker.remove();
    if (circle) circle.remove();
    pinLatLng = latlng;
    circleRadius = radius;
    marker = L.marker(latlng).addTo(map);
    circle = L.circle(latlng, {
      radius,
      color: '#fc4c02',
      weight: 2,
      fillColor: '#fc4c02',
      fillOpacity: 0.08,
    }).addTo(map);
  }

  map.doubleClickZoom.disable();

  map.on('mousedown', e => {
    if (e.originalEvent.detail < 2) return;
    isDragging = true;
    dragStart = e.latlng;
    map.dragging.disable();
    placePin(dragStart, 2000);
  });

  map.on('mousemove', e => {
    if (!isDragging || !dragStart) return;
    const r = dragStart.distanceTo(e.latlng);
    if (r > 100 && circle) circle.setRadius(r);
  });

  map.on('mouseup', e => {
    if (!isDragging) return;
    isDragging = false;
    map.dragging.enable();
    const r = dragStart.distanceTo(e.latlng);
    if (r > 100) {
      circleRadius = r;
      if (circle) circle.setRadius(r);
    } else {
      circleRadius = 2000;
      if (circle) circle.setRadius(2000);
    }
  });

  // ── search ─────────────────────────────────────────────────
  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.round(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  let lastResults = [];

  function renderResults() {
    const resultsEl = document.getElementById('results');
    const pavedOnly = document.getElementById('paved-only').checked;
    const filtered = pavedOnly
      ? lastResults.filter(s => s.is_paved === true)
      : lastResults;

    if (!lastResults.length) {
      resultsEl.innerHTML = '<p class="no-results">No matching climbs in this area.</p>';
      return;
    }
    if (!filtered.length) {
      resultsEl.innerHTML = '<p class="no-results">No paved climbs in these results.</p>';
      return;
    }

    resultsEl.innerHTML = filtered.map((s, i) => {
      const delta = Math.round(s.delta_s);
      const deltaStr = (delta >= 0 ? '+' : '') + delta + 's';
      const surfaceLabel = s.is_paved ? 'paved' : 'unpaved';
      return `
      <div class="result-card" data-idx="${i}">
        <div class="result-header">
          <a class="result-name" href="/climb/${s.id}">${s.name}</a>
          <span class="surface-tag surface-${surfaceLabel}">${surfaceLabel}</span>
        </div>
        <div class="result-meta">
          ${(s.distance_m / 1000).toFixed(2)} km &nbsp;·&nbsp;
          ${s.average_grade.toFixed(1)}% &nbsp;·&nbsp;
          ${formatTime(s.estimated_time_s)} &nbsp;·&nbsp;
          ${deltaStr} &nbsp;·&nbsp;
          ${Math.trunc(s.score * 100)} score
        </div>
      </div>
      `;
    }).join('');

    resultsEl.querySelectorAll('.result-card').forEach(card => {
      const s = filtered[+card.dataset.idx];
      card.addEventListener('mouseenter', () => {
        clearHover();
        if (s.polyline) {
          hoverLayers.push(L.polyline(decodePolyline(s.polyline), {
            color: '#fc4c02',
            weight: 3,
            opacity: 0.9,
          }).addTo(map));
        }
        hoverLayers.push(L.circleMarker([s.start_lat, s.start_lng], {
          radius: 5,
          color: '#fff',
          fillColor: '#fc4c02',
          fillOpacity: 1,
          weight: 2,
        }).addTo(map));
      });
      card.addEventListener('mouseleave', clearHover);
    });
  }

  document.getElementById('paved-only').addEventListener('change', renderResults);

  document.getElementById('find-btn').addEventListener('click', async () => {
    const weight   = parseFloat(document.getElementById('weight').value);
    const power    = parseFloat(document.getElementById('power').value);
    const interval = parseFloat(document.getElementById('interval').value);

    const errors = [];
    if (!pinLatLng)            errors.push('Place a pin on the map first');
    if (!(weight > 0))         errors.push('Enter a valid system weight');
    if (!(power > 0))          errors.push('Enter a valid power');
    if (!(interval > 0))       errors.push('Enter a valid interval time');

    const warnEl = document.getElementById('warnings');
    if (errors.length) {
      warnEl.innerHTML = errors.map(e => `<p class="warn">⚠ ${e}</p>`).join('');
      return;
    }
    warnEl.innerHTML = '';

    const btn = document.getElementById('find-btn');
    btn.disabled = true;
    btn.textContent = 'Searching…';

    try {
      const res = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          lat: pinLatLng.lat,
          lng: pinLatLng.lng,
          radius_m: circleRadius,
          weight_kg: weight,
          power_w: power,
          interval_s: interval,
        }),
      });

      lastResults = await res.json();
      renderResults();
      sessionStorage.setItem(SAVED_KEY, JSON.stringify({
        pin: { lat: pinLatLng.lat, lng: pinLatLng.lng },
        radius: circleRadius,
        weight, power, interval,
        pavedOnly: document.getElementById('paved-only').checked,
        results: lastResults,
      }));
    } catch {
      document.getElementById('results').innerHTML = '<p class="warn">⚠ Request failed.</p>';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Find';
    }
  });

  if (saved) {
    if (saved.pin) placePin(L.latLng(saved.pin.lat, saved.pin.lng), saved.radius || 2000);
    if (saved.weight   != null) document.getElementById('weight').value   = saved.weight;
    if (saved.power    != null) document.getElementById('power').value    = saved.power;
    if (saved.interval != null) document.getElementById('interval').value = saved.interval;
    if (saved.pavedOnly) document.getElementById('paved-only').checked = true;
    if (Array.isArray(saved.results)) {
      lastResults = saved.results;
      renderResults();
    }
  }
</script>
</body>
</html>

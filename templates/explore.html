<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>intfnd · explore</title>
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 1.1rem; font-weight: bold; color: #222; text-decoration: none; }
    .logo img { width: 24px; height: 24px; }
    nav.tabs { display: flex; gap: 4px; }
    nav.tabs a {
      padding: 6px 14px;
      font-size: 0.85rem;
      color: #555;
      text-decoration: none;
      border-radius: 4px;
    }
    nav.tabs a:hover { background: #f4f4f4; color: #222; }
    nav.tabs a.active { background: #2563eb; color: #fff; }

    /* ── filter bar ── */
    #filter-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 16px;
      height: 44px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
      font-size: 0.8rem;
      color: #555;
    }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-label { white-space: nowrap; color: #888; font-size: 0.78rem; }
    .filter-sep { color: #ccc; }
    .filter-group input[type=number] {
      width: 64px;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.8rem;
      background: #fafafa;
    }
    .filter-group input[type=number]:focus { outline: none; border-color: #2563eb; background: #fff; }
    .filter-group select {
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.8rem;
      background: #fafafa;
      color: #444;
      cursor: pointer;
    }
    .filter-group select:focus { outline: none; border-color: #2563eb; background: #fff; }

    /* dual-range grade slider */
    .dual-range {
      position: relative;
      width: 160px;
      height: 20px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .dr-track {
      position: absolute;
      left: 0; right: 0;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
    }
    .dr-fill {
      position: absolute;
      height: 4px;
      background: #2563eb;
      border-radius: 2px;
      pointer-events: none;
    }
    .dual-range input[type=range] {
      position: absolute;
      width: 100%;
      margin: 0;
      background: none;
      pointer-events: none;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
    }
    .dual-range input[type=range]::-webkit-slider-runnable-track { background: transparent; }
    .dual-range input[type=range]::-moz-range-track { background: transparent; height: 4px; }
    .dual-range input[type=range]::-webkit-slider-thumb {
      pointer-events: all;
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #2563eb;
      cursor: pointer;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1.5px #2563eb;
    }
    .dual-range input[type=range]::-moz-range-thumb {
      pointer-events: all;
      appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #2563eb;
      cursor: pointer;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1.5px #2563eb;
    }
    .filter-val {
      font-size: 0.75rem;
      color: #444;
      white-space: nowrap;
      min-width: 72px;
    }

    .filter-divider { width: 1px; height: 20px; background: #eee; flex-shrink: 0; }
    .toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.8rem;
      color: #555;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .toggle input { accent-color: #2563eb; cursor: pointer; }
    #status {
      margin-left: auto;
      font-size: 0.75rem;
      color: #999;
      white-space: nowrap;
    }
    #status.loading { color: #2563eb; }
    #status.error { color: #c0392b; }

    /* ── map + results panel ── */
    #map-area { position: relative; flex: 1; display: flex; overflow: hidden; }
    #map { flex: 1; }

    #results-panel {
      position: relative;
      width: 330px;
      max-width: 45%;
      flex-shrink: 0;
      background: #fff;
      border-left: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .rp-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }
    .rp-title { font-size: 0.85rem; font-weight: bold; color: #222; }

    #results-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px 14px;
      overflow-y: auto;
    }
    #results-list .result-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.1s, box-shadow 0.1s;
    }
    #results-list .result-card:hover { border-color: #2563eb; box-shadow: 0 1px 4px rgba(37, 99, 235, 0.18); }
    #results-list .result-header { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    #results-list .result-name {
      font-size: 0.9rem;
      font-weight: bold;
      color: #2563eb;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    #results-list .result-name::after { content: ' →'; font-weight: normal; }
    #results-list .result-meta { font-size: 0.78rem; color: #666; margin-top: 4px; }
    #results-list .surface-tag {
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    #results-list .surface-paved { background: #eef; color: #335; }
    #results-list .surface-unpaved { background: #f5ecdf; color: #7a4a1c; }
    #results-list .no-results { font-size: 0.85rem; color: #888; }

    /* start-point star shown while a climb is hovered/highlighted */
    .climb-star {
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .climb-star span {
      font-size: 20px;
      line-height: 1;
      /* white halo so the star stays legible over any basemap */
      text-shadow: 0 0 2px #fff, 0 0 2px #fff, 0 0 1px #fff;
    }

    /* ── climb tooltip ── */
    .climb-tip {
      font-family: monospace;
      font-size: 0.78rem;
      line-height: 1.5;
      padding: 6px 10px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      color: #222;
      pointer-events: none;
    }
    .climb-tip::before { display: none; }
    .climb-tip b { color: #2563eb; font-size: 0.85rem; }
    .climb-tip .tip-tags { display: flex; gap: 4px; margin-top: 4px; }
    .climb-tip .tag {
      font-size: 0.68rem;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .climb-tip .tag-paved { background: #eef; color: #335; }
    .climb-tip .tag-unpaved { background: #f5ecdf; color: #7a4a1c; }
    .climb-tip .tag-bidi { background: #e7f4ea; color: #2d6a3a; }
    .climb-tip .tag-oneway { background: #f4ece7; color: #6a3a2d; }
    /* divider between stacked climbs in a shared-segment tooltip */
    .climb-tip .tip-div { height: 1px; background: #e5e5e5; margin: 6px -2px; }

    /* ── climb selection popup (overlapping climbs) ── */
    .climb-select-popup .leaflet-popup-content { margin: 10px 12px; }
    .climb-select { font-family: monospace; font-size: 0.78rem; min-width: 190px; }
    .climb-select .cs-head {
      font-size: 0.68rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .climb-select .cs-item {
      display: block;
      padding: 6px 8px;
      border-radius: 4px;
      text-decoration: none;
      color: #222;
      border: 1px solid transparent;
    }
    .climb-select .cs-item:hover { background: #eef2ff; border-color: #c7d2fe; }
    .climb-select .cs-name { display: block; color: #2563eb; font-weight: bold; }
    .climb-select .cs-meta { display: block; font-size: 0.72rem; color: #666; margin-top: 2px; }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo"><img src="/icon.png" alt="">intfnd</a>
  <nav class="tabs">
    <a href="/">Search</a>
    <a href="/explore" class="active">Explore</a>
    <a href="/predictor">Predictor</a>
    <a href="/about">About</a>
  </nav>
</header>

<div id="filter-bar">
  <div class="filter-group">
    <span class="filter-label">dist (km)</span>
    <input id="min-dist" type="number" min="0" step="0.1" placeholder="min">
    <span class="filter-sep">–</span>
    <input id="max-dist" type="number" min="0" step="0.1" placeholder="max">
  </div>
  <div class="filter-divider"></div>
  <div class="filter-group">
    <span class="filter-label">grade</span>
    <div class="dual-range">
      <div class="dr-track"></div>
      <div class="dr-fill" id="grade-fill"></div>
      <input id="min-grade" type="range" min="0" max="25" step="0.5" value="0">
      <input id="max-grade" type="range" min="0" max="25" step="0.5" value="25">
    </div>
    <span class="filter-val" id="grade-val"></span>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-group">
    <span class="filter-label">surface</span>
    <select id="surface">
      <option value="all">all</option>
      <option value="paved">paved</option>
      <option value="unpaved">unpaved</option>
    </select>
  </div>
  <label class="toggle"><input id="bidirectional-only" type="checkbox"> bidi</label>
  <span id="status"></span>
</div>

<div id="map-area">
  <div id="map"></div>
  <aside id="results-panel">
    <div class="rp-head">
      <span class="rp-title"><span id="panel-count">0</span> top climbs in this area</span>
    </div>
    <div id="results-list"></div>
  </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19,
  }).addTo(map);

  const statusEl = document.getElementById('status');
  let climbLayers = [];
  let climbEntries = [];   // { climb, line, pts } for hit-testing overlaps
  let fetchTimer = null;
  let activeController = null;

  function decodePolyline(encoded) {
    const pts = [];
    let idx = 0, lat = 0, lng = 0;
    while (idx < encoded.length) {
      let b, shift = 0, result = 0;
      do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
      lat += (result & 1) ? ~(result >> 1) : (result >> 1);
      shift = result = 0;
      do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
      lng += (result & 1) ? ~(result >> 1) : (result >> 1);
      pts.push([lat / 1e5, lng / 1e5]);
    }
    return pts;
  }

  function clearClimbs() {
    climbLayers.forEach(l => l.remove());
    climbEntries.forEach(e => { if (e.star) e.star.remove(); });
    climbLayers = [];
    climbEntries = [];
    highlighted = [];
  }

  function renderClimbs(climbs) {
    clearClimbs();
    for (const c of climbs) {
      // start markers are purely visual; interaction goes through the map.
      const dot = L.circleMarker([c.start_lat, c.start_lng], {
        radius: 6,
        color: '#fff',
        fillColor: '#2563eb',
        fillOpacity: 1,
        weight: 2,
        interactive: false,
      }).addTo(map);
      climbLayers.push(dot);

      if (c.polyline) {
        const pts = decodePolyline(c.polyline);
        // lines are non-interactive: hover/click are handled centrally on the
        // map so we can detect several climbs sharing the same road segment.
        const line = L.polyline(pts, {
          color: '#2563eb',
          weight: 3,
          opacity: 0.75,
          interactive: false,
          dashArray: c.is_paved ? null : '3 7',   // unpaved → dotted line
        }).addTo(map);
        climbLayers.push(line);
        // dot is kept on the entry so hover can swap it for a star marker
        climbEntries.push({ climb: c, line, pts, dot, star: null });
      }
    }
    renderResultList(climbs);
  }

  // ── results panel (always-open list alongside the map) ──────────────────
  function renderResultList(climbs) {
    document.getElementById('panel-count').textContent = climbs.length;
    const listEl = document.getElementById('results-list');
    if (!climbs.length) {
      listEl.innerHTML = '<p class="no-results">No climbs in this area.</p>';
      return;
    }
    listEl.innerHTML = climbs.map(c => {
      const surf = c.is_paved ? 'paved' : 'unpaved';
      return `
      <div class="result-card" data-id="${c.id}">
        <div class="result-header">
          <a class="result-name" href="/climb/${c.id}?from=explore">${c.name}</a>
          <span class="surface-tag surface-${surf}">${surf}</span>
        </div>
        <div class="result-meta">
          ${(c.distance_m / 1000).toFixed(2)} km &nbsp;·&nbsp;
          ${c.average_grade.toFixed(1)}% &nbsp;·&nbsp;
          ${Math.trunc(c.score)} score
        </div>
      </div>`;
    }).join('');

    listEl.querySelectorAll('.result-card').forEach(card => {
      const id = card.dataset.id;
      const entry = climbEntries.find(e => e.climb.id === id);
      card.addEventListener('click', e => { e.preventDefault(); goToClimb(id); });
      card.addEventListener('mouseenter', () => { if (entry) setHighlight([entry], HIGHLIGHT_COLOR); });
      card.addEventListener('mouseleave', () => setHighlight([]));
    });
  }

  // ── overlap-aware hover & selection ─────────────────────────────────────
  const HIT_TOL = 8;                 // px tolerance for "cursor is on a climb"
  let highlighted = [];              // entries currently emphasised
  let selectionOpen = false;         // freeze hover while a picker is open

  const hoverTip = L.tooltip({ className: 'climb-tip', direction: 'top', offset: [0, -6] });

  function distToSeg(p, a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const l2 = dx * dx + dy * dy;
    if (l2 === 0) return Math.hypot(p.x - a.x, p.y - a.y);
    let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / l2;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(p.x - (a.x + t * dx), p.y - (a.y + t * dy));
  }

  function climbsNear(latlng) {
    const p = map.latLngToLayerPoint(latlng);
    const hits = [];
    for (const e of climbEntries) {
      let min = Infinity, prev = null;
      for (const ll of e.pts) {
        const cur = map.latLngToLayerPoint(ll);
        if (prev) min = Math.min(min, distToSeg(p, prev, cur));
        prev = cur;
      }
      if (min <= HIT_TOL) hits.push(e);
    }
    return hits;
  }

  const HIGHLIGHT_COLOR = '#e11d48';   // crimson — high contrast on green/yellow OSM tiles

  function starIcon(color) {
    return L.divIcon({
      className: 'climb-star',
      html: `<span style="color:${color}">★</span>`,
      iconSize: [22, 22],
      iconAnchor: [11, 11],
    });
  }

  // swap a climb's start dot for a star while it's highlighted
  function showStar(e, color) {
    if (map.hasLayer(e.dot)) e.dot.remove();
    if (!e.star) {
      e.star = L.marker(e.dot.getLatLng(), { icon: starIcon(color), interactive: false, keyboard: false }).addTo(map);
    } else {
      e.star.setIcon(starIcon(color));
      if (!map.hasLayer(e.star)) e.star.addTo(map);
    }
  }

  function hideStar(e) {
    if (e.star && map.hasLayer(e.star)) e.star.remove();
    if (!map.hasLayer(e.dot)) e.dot.addTo(map);
  }

  function setHighlight(entries, color) {
    // star is always the gold accent so the start visibly changes colour + shape
    const starColor = color || HIGHLIGHT_COLOR;
    for (const e of highlighted) {
      if (!entries.includes(e)) {
        e.line.setStyle({ weight: 3, opacity: 0.75, color: '#2563eb' });
        hideStar(e);
      }
    }
    for (const e of entries) {
      e.line.setStyle({ weight: 5, opacity: 1, color: color || '#2563eb' });
      e.line.bringToFront();   // draw on top so it isn't hidden by overlapping climbs
      showStar(e, starColor);
    }
    highlighted = entries;
  }

  function tipRow(c) {
    const surf = c.is_paved ? 'paved' : 'unpaved';
    const dir = c.bidirectional ? 'bidi' : 'oneway';
    const dirLabel = c.bidirectional ? 'bidirectional' : 'one-way';
    return `<b>${c.name}</b><br>` +
      `${(c.distance_m / 1000).toFixed(2)} km &nbsp;·&nbsp; ${c.average_grade.toFixed(1)}% &nbsp;·&nbsp; ${Math.trunc(c.score)} score` +
      `<div class="tip-tags">` +
      `<span class="tag tag-${surf}">${surf}</span>` +
      `<span class="tag tag-${dir}">${dirLabel}</span>` +
      `</div>`;
  }

  function goToClimb(id) { saveState(); window.location.href = `/climb/${id}?from=explore`; }

  map.on('mousemove', (e) => {
    if (selectionOpen) return;       // hover frozen while picking
    const hits = climbsNear(e.latlng);
    if (!hits.length) {
      setHighlight([]);
      if (map.hasLayer(hoverTip)) hoverTip.remove();
      map.getContainer().style.cursor = '';
      return;
    }
    setHighlight(hits);
    map.getContainer().style.cursor = 'pointer';
    hoverTip
      .setLatLng(e.latlng)
      .setContent(hits.map(h => tipRow(h.climb)).join('<div class="tip-div"></div>'));
    if (!map.hasLayer(hoverTip)) hoverTip.addTo(map);
  });

  map.on('click', (e) => {
    if (selectionOpen) return;
    const hits = climbsNear(e.latlng);
    if (!hits.length) return;
    if (hits.length === 1) { goToClimb(hits[0].climb.id); return; }

    // overlapping climbs: freeze the hover and let the user pick one.
    if (map.hasLayer(hoverTip)) hoverTip.remove();

    const box = document.createElement('div');
    box.className = 'climb-select';
    box.innerHTML = `<div class="cs-head">${hits.length} climbs here</div>`;
    for (const h of hits) {
      const surf = h.climb.is_paved ? 'paved' : 'unpaved';
      const a = document.createElement('a');
      a.className = 'cs-item';
      a.href = `/climb/${h.climb.id}?from=explore`;
      a.innerHTML =
        `<span class="cs-name">${h.climb.name}</span>` +
        `<span class="cs-meta">${(h.climb.distance_m / 1000).toFixed(2)} km · ` +
        `${h.climb.average_grade.toFixed(1)}% · ${surf}</span>`;
      a.addEventListener('click', (ev) => { ev.preventDefault(); goToClimb(h.climb.id); });
      a.addEventListener('mouseenter', () => setHighlight([h], HIGHLIGHT_COLOR));
      box.appendChild(a);
    }
    box.addEventListener('mouseleave', () => setHighlight(hits));

    selectionOpen = true;
    setHighlight(hits);
    L.popup({ className: 'climb-select-popup', autoClose: true })
      .setLatLng(e.latlng).setContent(box).openOn(map);
    map.once('popupclose', () => { selectionOpen = false; setHighlight([]); });
  });

  const GRADE_MAX = 25;

  function updateGradeSlider() {
    const minG = parseFloat(document.getElementById('min-grade').value);
    const maxG = parseFloat(document.getElementById('max-grade').value);
    const minPct = (minG / GRADE_MAX) * 100;
    const maxPct = (maxG / GRADE_MAX) * 100;
    const fill = document.getElementById('grade-fill');
    fill.style.left = minPct + '%';
    fill.style.width = (maxPct - minPct) + '%';
    document.getElementById('grade-val').textContent = `${minG.toFixed(1)} – ${maxG.toFixed(1)}%`;
  }

  document.getElementById('min-grade').addEventListener('input', () => {
    const el = document.getElementById('min-grade');
    const maxEl = document.getElementById('max-grade');
    if (parseFloat(el.value) > parseFloat(maxEl.value)) maxEl.value = el.value;
    updateGradeSlider(); scheduleFetch();
  });
  document.getElementById('max-grade').addEventListener('input', () => {
    const el = document.getElementById('max-grade');
    const minEl = document.getElementById('min-grade');
    if (parseFloat(el.value) < parseFloat(minEl.value)) minEl.value = el.value;
    updateGradeSlider(); scheduleFetch();
  });
  document.getElementById('min-dist').addEventListener('input', scheduleFetch);
  document.getElementById('max-dist').addEventListener('input', scheduleFetch);
  document.getElementById('surface').addEventListener('change', scheduleFetch);
  document.getElementById('bidirectional-only').addEventListener('change', scheduleFetch);

  updateGradeSlider();

  async function fetchArea() {
    if (activeController) activeController.abort();
    activeController = new AbortController();

    const bounds = map.getBounds();
    const sw = bounds.getSouthWest();
    const ne = bounds.getNorthEast();
    // half-diagonal of the view, sent only to scale the fit-ranking
    const radius_m = map.getCenter().distanceTo(ne);

    const minDistRaw = parseFloat(document.getElementById('min-dist').value);
    const maxDistRaw = parseFloat(document.getElementById('max-dist').value);
    const minGrade = parseFloat(document.getElementById('min-grade').value);
    const maxGrade = parseFloat(document.getElementById('max-grade').value);
    const surface = document.getElementById('surface').value;

    const body = {
      min_lat: sw.lat,
      min_lng: sw.lng,
      max_lat: ne.lat,
      max_lng: ne.lng,
      radius_m,
      min_distance_m: (Number.isFinite(minDistRaw) && minDistRaw > 0) ? minDistRaw * 1000 : null,
      max_distance_m: Number.isFinite(maxDistRaw) ? maxDistRaw * 1000 : null,
      min_grade: minGrade > 0 ? minGrade : null,
      max_grade: maxGrade < GRADE_MAX ? maxGrade : null,
      paved: surface === 'all' ? null : surface === 'paved',
      bidirectional_only: document.getElementById('bidirectional-only').checked,
    };

    statusEl.className = 'loading';
    statusEl.textContent = 'loading…';

    try {
      const res = await fetch('/api/explore', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: activeController.signal,
      });
      if (!res.ok) throw new Error('request failed');
      const climbs = await res.json();
      renderClimbs(climbs);
      statusEl.className = '';
      statusEl.textContent = climbs.length ? `${climbs.length} climb${climbs.length === 1 ? '' : 's'}` : 'no climbs here';
    } catch (e) {
      if (e.name === 'AbortError') return;
      statusEl.className = 'error';
      statusEl.textContent = 'request failed';
    }
  }

  function scheduleFetch() {
    clearTimeout(fetchTimer);
    fetchTimer = setTimeout(fetchArea, 400);
  }

  const EXPLORE_KEY = 'intfnd:explore';

  function saveState() {
    const center = map.getCenter();
    sessionStorage.setItem(EXPLORE_KEY, JSON.stringify({
      lat: center.lat,
      lng: center.lng,
      zoom: map.getZoom(),
      minDist: document.getElementById('min-dist').value,
      maxDist: document.getElementById('max-dist').value,
      minGrade: document.getElementById('min-grade').value,
      maxGrade: document.getElementById('max-grade').value,
      surface: document.getElementById('surface').value,
      bidirectionalOnly: document.getElementById('bidirectional-only').checked,
    }));
  }

  function restoreFilters(s) {
    document.getElementById('min-dist').value = s.minDist;
    document.getElementById('max-dist').value = s.maxDist;
    document.getElementById('min-grade').value = s.minGrade;
    document.getElementById('max-grade').value = s.maxGrade;
    document.getElementById('surface').value = s.surface || 'all';
    document.getElementById('bidirectional-only').checked = s.bidirectionalOnly;
    updateGradeSlider();
  }

  // shared map position, kept in sync across the Search ↔ Explore tabs
  const MAP_VIEW_KEY = 'intfnd:mapView';
  function saveMapView() {
    const c = map.getCenter();
    sessionStorage.setItem(MAP_VIEW_KEY, JSON.stringify({ lat: c.lat, lng: c.lng, zoom: map.getZoom() }));
  }
  const sharedView = (() => {
    try { return JSON.parse(sessionStorage.getItem(MAP_VIEW_KEY)); } catch { return null; }
  })();

  map.on('moveend', scheduleFetch);
  map.on('zoomend', scheduleFetch);
  map.on('moveend', saveMapView);
  map.on('zoomend', saveMapView);

  // the panel sits beside the map (not over it), so the map's visible area —
  // and thus the bounds sent to /api/explore — shrinks with the panel. keep
  // Leaflet's size in sync so getBounds() reflects what the user can actually see.
  window.addEventListener('resize', () => map.invalidateSize());

  const savedExplore = (() => {
    try { return JSON.parse(sessionStorage.getItem(EXPLORE_KEY)); } catch { return null; }
  })();

  if (savedExplore) restoreFilters(savedExplore);

  if (sharedView) {
    map.setView([sharedView.lat, sharedView.lng], sharedView.zoom);
  } else if (savedExplore) {
    map.setView([savedExplore.lat, savedExplore.lng], savedExplore.zoom);
  } else if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      p => map.setView([p.coords.latitude, p.coords.longitude], 13),
      () => map.setView([51.505, -0.09], 13)
    );
  } else {
    map.setView([51.505, -0.09], 13);
  }
</script>
</body>
</html>

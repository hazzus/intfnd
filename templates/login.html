<html lang="en">
<head>

    body {
      font-family: monospace;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }
    h1 { font-size: 1.4rem; color: #222; }
    p  { font-size: 0.85rem; color: #666; }

      border-radius: 4px;
      text-decoration: none;

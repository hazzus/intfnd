<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>intfnd — syncing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: monospace;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
    }
    h1 { font-size: 1.2rem; color: #222; }
    .bar-wrap {
      width: 320px;
      background: #ddd;
      border-radius: 4px;
      height: 12px;
      overflow: hidden;
    }
    .bar {
      height: 100%;
      background: #fc4c02;
      width: 0%;
      transition: width 0.4s ease;
      border-radius: 4px;
    }
    #status { font-size: 0.9rem; color: #555; }
    #done-msg { font-size: 0.9rem; color: #2a9d2a; display: none; }
  </style>
</head>
<body>
  <h1>Syncing your Strava activities&hellip;</h1>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <div id="status">Loading&hellip;</div>
  <div id="done-msg">&#10003; Sync complete — ready to search</div>
  <script>
    async function poll() {
      try {
        const res = await fetch('/api/sync/status');
        const { total, done } = await res.json();
        const pct = total > 0 ? Math.round(done / total * 100) : 0;
        document.getElementById('bar').style.width = pct + '%';
        if (total === 0 && done === 0) {
          document.getElementById('status').textContent = 'Waiting for sync to start…';
        } else {
          document.getElementById('status').textContent =
            done + ' / ' + (total || '?') + ' activities processed (' + pct + '%)';
        }
        if (total > 0 && done >= total) {
          document.getElementById('done-msg').style.display = 'block';
        } else {
          setTimeout(poll, 2000);
        }
      } catch (e) {
        document.getElementById('status').textContent = 'Error fetching status, retrying…';
        setTimeout(poll, 3000);
      }
    }
    poll();
  </script>
</body>
</html>
